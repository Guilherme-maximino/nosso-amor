<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossa História 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css.css">
</head>
<body>

<audio id="bgMusic" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- TELA 1 -->
<section id="home" class="screen home">

    <div class="decorations">
        <img src="imagens/Kuromi.webp" class="decor decor1">
        <img src="imagens/Hello Kitty.webp" class="decor decor2">
        <img src="imagens/daniel.webp" class="decor decor3">
        <img src="imagens/Badtz.webp" class="decor decor4">
    </div>

    <div class="home-content">
        <h1 data-text="Feliz Nosso Dia 💜">Feliz Nosso Dia 💜</h1>

        <p class="subtitle">
            Cada segundo ao seu lado se torna uma memória eterna
        </p>

        <button onclick="startExperience()">Começar</button>
    </div>

</section>

<!-- TELA 2 -->
<section id="timeline" class="screen timeline">

<h2 class="instruction">Clique no selo e revele nossa história</h2>

<div class="letters-container" id="lettersContainer"></div>

<button onclick="goTo('music')">Continuar</button>

</section>

<!-- TELA 3 -->
<section id="music" class="screen music">

    <div class="music-card">
        <img src="imagens/zima.jpg" class="music-cover">

        <iframe 
            src="https://open.spotify.com/embed/track/2RG9i0m6y5HJ27gZvNSzOs"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>

        <a href="https://open.spotify.com/track/2RG9i0m6y5HJ27gZvNSzOs" 
           target="_blank" 
           class="spotify-btn">
           Ouvir no Spotify 🎧
        </a>
    </div>

    <div class="music-card">
        <img src="imagens/da lua.png" class="music-cover">

        <iframe 
            src="https://open.spotify.com/embed/track/0F1FsfYvx7eyAC64EPzD7S"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>

        <a href="https://open.spotify.com/track/0F1FsfYvx7eyAC64EPzD7S" 
           target="_blank" 
           class="spotify-btn">
           Ouvir no Spotify 🎧
        </a>
    </div>

    <div class="music-card">
        <img src="imagens/camisa 10.jpg" class="music-cover">

        <iframe 
            src="https://open.spotify.com/embed/track/4gjjWs6nwNLpMRYMa4Z2DZ"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>

        <a href="https://open.spotify.com/track/4gjjWs6nwNLpMRYMa4Z2DZ" 
           target="_blank" 
           class="spotify-btn">
           Ouvir no Spotify 🎧
        </a>
    </div>

    <button onclick="goTo('final')">Continuar</button>

</section>

<!-- TELA 4 -->
<section id="final" class="screen final">

    <h2>Estamos juntos há exatos...</h2>

    <div id="counter">
        <div class="time-block">
            <span class = "number" id="years"></span>
            <small>anos</small>
        </div>
        <div class="time-block">
            <span class = "number" id="months"></span>
            <small>meses</small>
        </div>
        <div class="time-block">
            <span class = "number" id="weeks"></span>
            <small>semanas</small>
        </div>
        <div class="time-block">
            <span class = "number" id="days"></span>
            <small>dias</small>
        </div>

        <div class="time-block animated">
            <div class="number-wrapper">
                <span class="number" id="hours"></span>
            </div>
            <small>horas</small>
        </div>

        <div class="time-block animated">
            <div class="number-wrapper">
                <span class="number" id="minutes"></span>
            </div>
            <small>minutos</small>
        </div>

    <div class="time-block animated">
    <div class="number-wrapper">
        <span class="number" id="seconds"></span>
    </div>
    <small>segundos</small>
    </div>
    </div>

</section>

<div id="photoModal">
    <div class="modal-content">
        <img id="modalImg">
        <p id="modalCaption"></p>
    </div>
</div>

<div class="photo-overlay"></div>
<script src="script.js"></script>
</body>
</html>
